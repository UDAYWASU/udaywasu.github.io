<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uday Wasu | Autonomous Systems</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #64748b;
            --cursor-x: 50vw;
            --cursor-y: 50vh;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden; /* Prevents scroll on the landing hero */
        }

        /* The Lidar/Blueprint Background */
        .blueprint-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(56, 189, 248, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.3;
            z-index: 0;
        }

        /* The Darkness Overlay that the mouse cuts through */
/* Updated Overlay */
.sensor-overlay {
    position: fixed; /* Fixed ensures it stays put even if we add scrolling later */
    top: 0; 
    left: 0; 
    width: 100vw; 
    height: 100vh;
    background: radial-gradient(
        circle 350px at var(--cursor-x) var(--cursor-y), 
        transparent 0%, 
        rgba(5, 5, 5, 0.98) 70% /* Creates a sharper flashlight edge */
    );
    z-index: 1;
    pointer-events: none; 
    transition: background 0.1s ease-out; /* Adds a tiny bit of smoothness */
}

/* Also make sure your blueprint uses fixed positioning */
.blueprint-bg {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background-image: 
        linear-gradient(rgba(56, 189, 248, 0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56, 189, 248, 0.15) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
}

        /* Navigation */
        nav {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
        }
        
        .logo img {
            height: 40px; /* Adjust based on your transparent logo */
            filter: drop-shadow(0 0 8px rgba(56,189,248,0.5));
        }

        nav ul { display: flex; list-style: none; gap: 3rem; }
        nav a { 
            text-decoration: none; 
            color: var(--text-main); 
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s; 
        }
        nav a:hover { color: var(--accent); }

        /* Hero Content */
        .hero-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            height: calc(100vh - 100px);
            padding-left: 10%;
            max-width: 800px;
        }

        .system-status {
            font-family: 'Fira Code', monospace;
            color: var(--accent);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1.5rem;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: var(--text-dim);
            max-width: 600px;
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        /* Call to Action Buttons */
        .cta-group { display: flex; gap: 1.5rem; }
        .btn {
            padding: 1rem 2rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-primary {
            background: var(--text-main);
            color: var(--bg-color);
            font-weight: 600;
        }
        .btn-primary:hover {
            background: var(--accent);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }
        .btn-secondary {
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-main);
        }
        .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="blueprint-bg"></div>
    <div class="sensor-overlay" id="sensorOverlay"></div>

    <nav>
        <div class="logo">
            <img src="logowu.png" alt="Uday Wasu Logo" onerror="this.outerHTML='<h2 style=\'color:var(--accent); font-weight:800;\'>UW.</h2>'">
        </div>
        <ul>
            <li><a href="#about">About</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="resume.html">Resume</a></li>
        </ul>
    </nav>

    <main class="hero-content">
        <div class="system-status">SYS.OP: ONLINE // IIT_M_DATA_SCI</div>
        <h1>Bridging <span style="color: transparent; -webkit-text-stroke: 1px var(--accent);">Data</span> <br> & Physical Space.</h1>
        <p class="subtitle">I design intelligent control systems, computer vision algorithms, and autonomous robotics to solve complex real-world problems.</p>
        
        <div class="cta-group">
            <a href="projects.html" class="btn btn-primary">Initialize.Projects()</a>
            <a href="https://github.com/udaywasu" target="_blank" class="btn btn-secondary">View Repository</a>
        </div>
    </main>

<script>
    // Bulletproof Sensor Spotlight Logic
    document.addEventListener('mousemove', (e) => {
        // Targets the :root element directly
        document.documentElement.style.setProperty('--cursor-x', `${e.clientX}px`);
        document.documentElement.style.setProperty('--cursor-y', `${e.clientY}px`);
    });

    // Fallback for mobile/touch devices
    document.addEventListener('touchmove', (e) => {
        document.documentElement.style.setProperty('--cursor-x', `${e.touches[0].clientX}px`);
        document.documentElement.style.setProperty('--cursor-y', `${e.touches[0].clientY}px`);
    });
</script>
</body>
</html>
